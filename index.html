<body>
<div id="pin-screen">
  <!-- Overlay sombre par dessus la photo -->
  <div id="pin-overlay" style="position:absolute;inset:0;background:rgba(0,0,0,0.45);display:none;border-radius:inherit"></div>
  <!-- Contenu centré par dessus l'overlay -->
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px">
    <h1>MY Wallet 💛</h1>
    <p>Entrez votre code PIN</p>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-err" id="pin-err"></div>
    <div class="pin-pad" id="pin-pad">
      <button class="pin-btn" data-k="1">1</button>
      <button class="pin-btn" data-k="2">2</button>
      <button class="pin-btn" data-k="3">3</button>
      <button class="pin-btn" data-k="4">4</button>
      <button class="pin-btn" data-k="5">5</button>
      <button class="pin-btn" data-k="6">6</button>
      <button class="pin-btn" data-k="7">7</button>
      <button class="pin-btn" data-k="8">8</button>
      <button class="pin-btn" data-k="9">9</button>
      <button class="pin-btn" style="visibility:hidden"></button>
      <button class="pin-btn" data-k="0">0</button>
      <button class="pin-btn" data-k="del">⌫</button>
    </div>
  </div>
</div>
<div id="app"></div>
<script src="app.js"></script>
</body>
</html>
